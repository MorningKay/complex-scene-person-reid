run:
  name: resnet50_ce_pretrained_msmt17
  seed: 42
  smoke: false
data:
  name: msmt17_v1
  root: data/MSMT17_V1
  image_size: [256, 128]
  batch_size: 16
  num_workers: 4
  random_erasing: false
  pin_memory: true
  drop_last: false
model:
  num_classes: 1041
  feature_dim: 2048
  last_stride: 1
  pretrained: true
loss:
  label_smoothing: 0.0
optimizer:
  lr: 0.0003
  weight_decay: 0.0005
train:
  epochs: 20
  max_batches:
  log_interval: 20
eval:
  enabled: true
  interval: 1
  batch_size: 128
  num_workers: 4
  distance: cosine
  query_chunk_size: 256

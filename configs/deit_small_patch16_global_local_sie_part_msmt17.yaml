run:
  name: deit_small_patch16_global_local_sie_part_msmt17
  seed: 42
  smoke: false
data:
  name: msmt17_v1
  root: data/MSMT17_V1
  image_size: [256, 128]
  batch_size: 64
  num_workers: 4
  random_erasing: true
  random_erasing_prob: 0.5
  padding: 10
  pin_memory: true
  drop_last: false
sampler:
  name: pk
  num_pids: 16
  num_instances: 4
model:
  name: vit_patch16_global_local
  backbone_name: deit_small_patch16_224
  num_classes: 1041
  feature_dim: 512
  pretrained: true
  patch_size: 16
  num_parts: 4
  sie_camera: true
  sie_num_cameras: 15
  sie_coefficient: 2.0
  part_classifiers: true
loss:
  label_smoothing: 0.0
  part_weight: 1.0
  triplet:
    enabled: true
    margin: 0.3
    weight: 1.0
    normalize_features: true
optimizer:
  name: adamw
  lr: 0.00005
  weight_decay: 0.05
scheduler:
  name: cosine
  min_lr: 0.000001
  warmup_epochs: 5
  warmup_factor: 0.1
train:
  epochs: 40
  max_batches:
  log_interval: 20
  amp: true
  grad_clip_norm:
eval:
  enabled: true
  interval: 1
  batch_size: 128
  num_workers: 4
  distance: cosine
  query_chunk_size: 256
